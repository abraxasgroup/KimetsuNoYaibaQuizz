<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kimetsu no Yaiba — Hero</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #C0392B;
      --red-bright: #E74C3C;
      --red-glow:   rgba(192,57,43,0.5);
      --green:      #1E6B44;
      --gold:       #C9A84C;
      --bg:         #050608;
      --text:       #F0E6D3;
      --muted:      #7A6A5A;
    }

    html, body {
      width: 100%; min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: 'Crimson Pro', serif;
      overflow-x: hidden;
    }

    /* ── HERO WRAPPER ── */
    .hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 2rem 1.5rem 5rem;
    }

    /* ── CAPAS DE FONDO ── */

    /* Patrón Tanjiro: cuadros diagonales verdes */
    .hero-pattern {
      position: absolute; inset: 0; z-index: 0;
      background-image:
        repeating-linear-gradient(45deg,
          transparent, transparent 22px,
          rgba(30,107,68,0.055) 22px, rgba(30,107,68,0.055) 24px),
        repeating-linear-gradient(-45deg,
          transparent, transparent 22px,
          rgba(30,107,68,0.055) 22px, rgba(30,107,68,0.055) 24px);
    }

    /* Viñeta radial */
    .hero-vignette {
      position: absolute; inset: 0; z-index: 1;
      background: radial-gradient(ellipse 80% 80% at 50% 50%,
        transparent 20%, rgba(0,0,0,0.75) 100%);
    }

    /* Glow rojo central detrás del título */
    .hero-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -55%);
      width: 700px; height: 500px;
      background: radial-gradient(ellipse,
        rgba(192,57,43,0.18) 0%,
        rgba(192,57,43,0.06) 40%,
        transparent 70%);
      z-index: 1;
      pointer-events: none;
      animation: pulse-glow 4s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { opacity: 0.8; transform: translate(-50%,-55%) scale(1); }
      50%       { opacity: 1;   transform: translate(-50%,-55%) scale(1.08); }
    }

    /* Líneas de respiración animadas */
    .breath-lines {
      position: absolute; inset: 0; z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }

    .breath-line {
      position: absolute;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(192,57,43,0.4), transparent);
      transform-origin: left center;
      animation: breath-sweep linear infinite;
      opacity: 0;
    }

    @keyframes breath-sweep {
      0%   { opacity: 0; transform: scaleX(0) rotate(var(--angle)); }
      15%  { opacity: 1; }
      85%  { opacity: 0.6; }
      100% { opacity: 0; transform: scaleX(1.4) rotate(var(--angle)); }
    }

    /* Canvas para partículas */
    #hero-canvas {
      position: absolute; inset: 0; z-index: 3;
      pointer-events: none;
    }

    /* ── IMAGEN DE TANJIRO ── */
    .tanjiro-wrap {
      position: absolute;
      bottom: 0; right: 5%;
      z-index: 4;
      width: clamp(220px, 28vw, 380px);
      height: auto;
      animation: tanjiro-float 6s ease-in-out infinite;
    }

    @keyframes tanjiro-float {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-14px); }
    }

    .tanjiro-img {
      width: 100%;
      display: block;
      filter:
        drop-shadow(0 0 30px rgba(192,57,43,0.5))
        drop-shadow(0 0 80px rgba(192,57,43,0.2));
    }

    .tanjiro-img-fallback {
      width: 100%;
      padding-bottom: 140%;
      background: linear-gradient(160deg, #1a0505, #2a0808);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── CONTENIDO PRINCIPAL ── */
    .hero-content {
      position: relative;
      z-index: 5;
      text-align: center;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
      padding-right: clamp(0px, 20vw, 200px); /* espacio para Tanjiro en desktop */
    }

    /* Kanji superior */
    .hero-kanji {
      font-family: 'Cinzel', serif;
      font-size: clamp(0.9rem, 2vw, 1.1rem);
      letter-spacing: 0.6em;
      color: var(--red);
      opacity: 0.7;
      animation: fade-down 1s ease both;
      text-shadow: 0 0 20px var(--red-glow);
    }

    /* Título principal */
    .hero-title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(3rem, 9vw, 7rem);
      line-height: 0.88;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      animation: fade-down 1s 0.1s ease both;
      position: relative;
    }

    .hero-title .line1 {
      display: block;
      background: linear-gradient(170deg, #F5E6C8 0%, #C9A84C 45%, #8B5E1A 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 2px 0 rgba(0,0,0,0.5));
    }

    .hero-title .line2 {
      display: block;
      font-size: 0.62em;
      letter-spacing: 0.22em;
      background: linear-gradient(170deg, #E74C3C 0%, #8B1010 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 15px rgba(192,57,43,0.6));
    }

    /* Separador decorativo */
    .hero-divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      width: 100%;
      max-width: 400px;
      animation: fade-up 0.8s 0.35s ease both;
    }

    .hero-divider::before,
    .hero-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(192,57,43,0.5));
    }
    .hero-divider::after {
      background: linear-gradient(270deg, transparent, rgba(192,57,43,0.5));
    }

    .divider-diamond {
      width: 8px; height: 8px;
      background: var(--red);
      transform: rotate(45deg);
      box-shadow: 0 0 8px var(--red-glow);
      animation: diamond-pulse 2s ease-in-out infinite;
    }

    @keyframes diamond-pulse {
      0%, 100% { box-shadow: 0 0 8px var(--red-glow); }
      50%       { box-shadow: 0 0 20px var(--red-glow), 0 0 40px rgba(192,57,43,0.3); }
    }

    /* Subtítulo / slogan rotativo */
    .hero-slogan-wrap {
      height: 2.2em;
      overflow: hidden;
      position: relative;
      width: 100%;
      animation: fade-up 0.8s 0.5s ease both;
    }

    .hero-slogan {
      font-family: 'Crimson Pro', serif;
      font-size: clamp(1rem, 2.5vw, 1.35rem);
      font-style: italic;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-align: center;
      position: absolute;
      width: 100%;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .hero-slogan.active {
      opacity: 1;
      transform: translateY(0);
    }

    .hero-slogan .character-name {
      color: var(--gold);
      font-style: normal;
      font-weight: 600;
    }

    /* Stats del anime */
    .hero-stats {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fade-up 0.8s 0.7s ease both;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.2rem;
    }

    .stat-number {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 900;
      color: var(--text);
      line-height: 1;
      position: relative;
    }

    .stat-number::after {
      content: attr(data-suffix);
      font-size: 0.5em;
      color: var(--red);
      margin-left: 2px;
      vertical-align: super;
    }

    .stat-label {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-divider {
      width: 1px;
      height: 40px;
      background: rgba(255,255,255,0.08);
      align-self: center;
    }

    /* Botón CTA */
    .hero-cta {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      animation: fade-up 0.8s 0.9s ease both;
    }

    .btn-hero-primary {
      font-family: 'Cinzel', serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
      background: linear-gradient(135deg, var(--red) 0%, #7A1515 100%);
      border: none;
      padding: 1rem 2.5rem;
      border-radius: 4px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-shadow: 0 4px 30px rgba(192,57,43,0.35);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
    }

    .btn-hero-primary::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .btn-hero-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 40px rgba(192,57,43,0.55);
    }

    .btn-hero-primary:hover::before { opacity: 1; }
    .btn-hero-primary:active { transform: translateY(-1px); }

    .btn-hero-secondary {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--muted);
      background: transparent;
      border: 1px solid rgba(255,255,255,0.1);
      padding: 1rem 2rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
    }

    .btn-hero-secondary:hover {
      border-color: rgba(255,255,255,0.25);
      color: var(--text);
      background: rgba(255,255,255,0.04);
    }

    /* Scroll indicator */
    .scroll-indicator {
      position: absolute;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      animation: fade-up 1s 1.2s ease both;
      opacity: 0.5;
    }

    .scroll-text {
      font-family: 'Cinzel', serif;
      font-size: 0.6rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .scroll-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(180deg, var(--red) 0%, transparent 100%);
      animation: scroll-drop 2s ease-in-out infinite;
    }

    @keyframes scroll-drop {
      0%   { transform: scaleY(0); transform-origin: top; opacity: 1; }
      50%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
      51%  { transform: scaleY(1); transform-origin: bottom; opacity: 1; }
      100% { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
    }

    /* ── ANIMACIONES GENERALES ── */
    @keyframes fade-down {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 680px) {
      .tanjiro-wrap {
        position: relative;
        right: auto; bottom: auto;
        width: clamp(140px, 50vw, 220px);
        margin-top: -1rem;
        order: -1;
        animation: tanjiro-float 6s ease-in-out infinite;
      }

      .hero { flex-direction: column; justify-content: flex-start; padding-top: 3rem; }
      .hero-content { padding-right: 0; }
      .stat-divider { display: none; }
    }

    @media (min-width: 681px) {
      .tanjiro-wrap { position: absolute; }
    }
  </style>
</head>
<body>

<section class="hero" id="hero">

  <!-- Fondos -->
  <div class="hero-pattern" aria-hidden="true"></div>
  <div class="hero-vignette" aria-hidden="true"></div>
  <div class="hero-glow" aria-hidden="true"></div>

  <!-- Líneas de respiración -->
  <div class="breath-lines" aria-hidden="true" id="breath-lines"></div>

  <!-- Canvas de partículas -->
  <canvas id="hero-canvas" aria-hidden="true"></canvas>

  <!-- Imagen de Tanjiro -->
  <div class="tanjiro-wrap" aria-hidden="true">
    <img
      class="tanjiro-img"
      src="tanjiro.png"
      alt="Tanjiro Kamado"
      id="tanjiro-img"
    />
  </div>

  <!-- Contenido -->
  <div class="hero-content">

    <p class="hero-kanji" aria-label="Kimetsu no Yaiba en japonés">鬼滅の刃</p>

    <h1 class="hero-title">
      <span class="line1">Kimetsu</span>
      <span class="line2">no Yaiba</span>
    </h1>

    <div class="hero-divider" aria-hidden="true">
      <div class="divider-diamond"></div>
    </div>

    <!-- Slogan rotativo -->
    <div class="hero-slogan-wrap" role="region" aria-label="Frases de los personajes" aria-live="polite">
      <!-- Generado por JS -->
    </div>

    <!-- Stats -->
    <div class="hero-stats" role="list" aria-label="Datos del anime">
      <div class="stat-item" role="listitem">
        <span class="stat-number" data-target="207" data-suffix="+">0</span>
        <span class="stat-label">Capítulos</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat-item" role="listitem">
        <span class="stat-number" data-target="9" data-suffix="">0</span>
        <span class="stat-label">Pilares</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat-item" role="listitem">
        <span class="stat-number" data-target="6" data-suffix="">0</span>
        <span class="stat-label">Lunas Sup.</span>
      </div>
      <div class="stat-divider" aria-hidden="true"></div>
      <div class="stat-item" role="listitem">
        <span class="stat-number" data-target="44" data-suffix="">0</span>
        <span class="stat-label">Técnicas de Respiración</span>
      </div>
    </div>

    <!-- CTA -->
    <div class="hero-cta">
      <button class="btn-hero-primary" id="btn-start" onclick="scrollToApp()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M8 2L14 8L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        Comenzar Quiz
      </button>
      <button class="btn-hero-secondary" onclick="scrollToApp()">
        Ver modos →
      </button>
    </div>

  </div><!-- /hero-content -->

  <!-- Scroll indicator -->
  <div class="scroll-indicator" aria-hidden="true">
    <span class="scroll-text">Desplazar</span>
    <div class="scroll-line"></div>
  </div>

</section>

<!-- ============================================================
     AQUÍ VA TU APP EXISTENTE  (pegar el <main id="app"> abajo)
     ============================================================ -->
<div id="app-anchor"></div>

<script>
  /* ── SLOGANS ROTATIVOS ── */
  const SLOGANS = [
    { char: 'Tanjiro',  text: '"Sin importar cuántas veces me rompa, me volveré a levantar."' },
    { char: 'Rengoku',  text: '"¡Pon todo tu corazón en llamas y avanza!"' },
    { char: 'Zenitsu',  text: '"Aunque me muera del miedo, haré lo que deba hacer."' },
    { char: 'Inosuke',  text: '"¡Nadie sabe el techo de mis capacidades más que yo!"' },
    { char: 'Shinobu',  text: '"Sigo sonriendo porque hace mucho que aprendí a hacerlo."' },
    { char: 'Nezuko',   text: '"Protege a los humanos. Sé fuerte. Sé gentil."' },
    { char: 'Gyomei',   text: '"La fe y la voluntad mueven montañas que el acero no puede cortar."' },
    { char: 'Muzan',    text: '"La eternidad no se concede. Se arrebata."' },
  ];

  const sloganWrap = document.querySelector('.hero-slogan-wrap');
  let sloganIndex = 0;

  function buildSlogans() {
    SLOGANS.forEach((s, i) => {
      const el = document.createElement('p');
      el.className = 'hero-slogan' + (i === 0 ? ' active' : '');
      el.innerHTML = `<span class="character-name">${s.char}</span> — ${s.text}`;
      sloganWrap.appendChild(el);
    });
  }

  function rotateSlogans() {
    const items = sloganWrap.querySelectorAll('.hero-slogan');
    items[sloganIndex].classList.remove('active');
    sloganIndex = (sloganIndex + 1) % items.length;
    items[sloganIndex].classList.add('active');
  }

  buildSlogans();
  setInterval(rotateSlogans, 3800);

  /* ── CONTADOR ANIMADO DE STATS ── */
  function animateCounters() {
    const nums = document.querySelectorAll('.stat-number[data-target]');
    nums.forEach(el => {
      const target = parseInt(el.dataset.target);
      const duration = 1800;
      const start = performance.now();
      function update(now) {
        const t = Math.min((now - start) / duration, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        el.textContent = Math.round(ease * target);
        if (t < 1) requestAnimationFrame(update);
        else el.textContent = target;
      }
      requestAnimationFrame(update);
    });
  }

  /* Observador para disparar contadores al hacer scroll */
  const heroSection = document.getElementById('hero');
  const statsObserver = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) {
      setTimeout(animateCounters, 600);
      statsObserver.disconnect();
    }
  }, { threshold: 0.4 });
  statsObserver.observe(heroSection);

  /* ── LÍNEAS DE RESPIRACIÓN ── */
  (function buildBreathLines() {
    const container = document.getElementById('breath-lines');
    const LINE_COUNT = 12;
    for (let i = 0; i < LINE_COUNT; i++) {
      const line = document.createElement('div');
      line.className = 'breath-line';
      const angle = (Math.random() - 0.5) * 60;
      const top   = 20 + Math.random() * 60;
      const left  = -10 + Math.random() * 30;
      const width = 40 + Math.random() * 50;
      const dur   = 2.5 + Math.random() * 3;
      const delay = Math.random() * 5;
      line.style.cssText = `
        --angle: ${angle}deg;
        top: ${top}%;
        left: ${left}%;
        width: ${width}vw;
        animation-duration: ${dur}s;
        animation-delay: ${delay}s;
      `;
      container.appendChild(line);
    }
  })();

  /* ── PARTÍCULAS EN CANVAS ── */
  (function initParticles() {
    const canvas = document.getElementById('hero-canvas');
    const ctx    = canvas.getContext('2d');
    let W, H;
    const PARTICLE_COUNT = 55;
    const particles = [];

    function resize() {
      W = canvas.width  = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    const COLORS = [
      'rgba(192,57,43,',
      'rgba(201,168,76,',
      'rgba(30,107,68,',
      'rgba(240,230,211,'
    ];

    for (let i = 0; i < PARTICLE_COUNT; i++) {
      particles.push({
        x:    Math.random(),
        y:    1 + Math.random() * 0.5,  /* empieza bajo la pantalla */
        size: 0.8 + Math.random() * 2.5,
        speed: 0.00015 + Math.random() * 0.0003,
        drift: (Math.random() - 0.5) * 0.0001,
        alpha: 0,
        maxAlpha: 0.2 + Math.random() * 0.5,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        phase: Math.random() * Math.PI * 2,
      });
    }

    function draw(t) {
      ctx.clearRect(0, 0, W, H);

      for (const p of particles) {
        p.y     -= p.speed;
        p.x     += p.drift;
        p.alpha  = p.maxAlpha * Math.sin(p.phase + p.y * Math.PI);

        if (p.y < -0.05) {
          p.y     = 1.1;
          p.x     = Math.random();
          p.phase = Math.random() * Math.PI * 2;
        }

        if (p.alpha < 0) p.alpha = 0;

        ctx.beginPath();
        ctx.arc(p.x * W, p.y * H, p.size, 0, Math.PI * 2);
        ctx.fillStyle = p.color + p.alpha.toFixed(2) + ')';
        ctx.fill();
      }

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  })();

  /* ── PARALLAX SUAVE AL MOVER EL RATÓN ── */
  document.addEventListener('mousemove', function(e) {
    const cx = window.innerWidth  / 2;
    const cy = window.innerHeight / 2;
    const dx = (e.clientX - cx) / cx;
    const dy = (e.clientY - cy) / cy;

    const glow = document.querySelector('.hero-glow');
    if (glow) {
      glow.style.transform = `translate(calc(-50% + ${dx * 20}px), calc(-55% + ${dy * 12}px))`;
    }

    const tanjiro = document.querySelector('.tanjiro-wrap');
    if (tanjiro && window.innerWidth > 680) {
      tanjiro.style.transform = `translateY(calc(var(--float-y, 0px) + ${dy * -8}px)) translateX(${dx * -5}px)`;
    }
  });

  /* ── FALLBACK IMAGEN TANJIRO ── */
  const tanjiroImg = document.getElementById('tanjiro-img');
  tanjiroImg.onerror = function() {
    const wrap = document.querySelector('.tanjiro-wrap');
    wrap.innerHTML = `
      <div class="tanjiro-img-fallback">
        <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
