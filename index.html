<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鬼滅の刃 — Quiz Definitivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="minijuegos.css" />

  <style>
  /* ===== ESTILOS DEL HERO (sin cambios, los mismos que tenías) ===== */
  .hero {
    position: relative; width: 100%; min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden; padding: 2rem 1.5rem 5rem;
  }
  .hero-pattern {
    position: absolute; inset: 0; z-index: 0;
    background-image:
      repeating-linear-gradient(45deg, transparent, transparent 22px,
        rgba(30,107,68,0.055) 22px, rgba(30,107,68,0.055) 24px),
      repeating-linear-gradient(-45deg, transparent, transparent 22px,
        rgba(30,107,68,0.055) 22px, rgba(30,107,68,0.055) 24px);
  }
  .hero-vignette {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse 80% 80% at 50% 50%,
      transparent 20%, rgba(0,0,0,0.75) 100%);
  }
  .hero-glow {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%,-55%);
    width: 700px; height: 500px; z-index: 1;
    pointer-events: none;
    background: radial-gradient(ellipse,
      rgba(192,57,43,0.18) 0%, rgba(192,57,43,0.06) 40%, transparent 70%);
    animation: hg-pulse 4s ease-in-out infinite;
  }
  @keyframes hg-pulse {
    0%,100% { opacity:.8; transform:translate(-50%,-55%) scale(1); }
    50%      { opacity:1;  transform:translate(-50%,-55%) scale(1.08); }
  }
  .hero-breath-lines {
    position: absolute; inset: 0; z-index: 2;
    pointer-events: none; overflow: hidden;
  }
  .hero-breath-line {
    position: absolute; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(192,57,43,0.4), transparent);
    transform-origin: left center;
    animation: hg-sweep linear infinite; opacity: 0;
  }
  @keyframes hg-sweep {
    0%   { opacity:0; transform:scaleX(0) rotate(var(--angle)); }
    15%  { opacity:1; }
    85%  { opacity:.6; }
    100% { opacity:0; transform:scaleX(1.4) rotate(var(--angle)); }
  }
  #hero-canvas {
    position: absolute; inset: 0; z-index: 3; pointer-events: none;
  }
  .hero-tanjiro-wrap {
    position: absolute; bottom: 0; right: 5%;
    z-index: 4; width: clamp(220px,28vw,380px);
    animation: hg-float 6s ease-in-out infinite;
  }
  @keyframes hg-float {
    0%,100% { transform:translateY(0); }
    50%      { transform:translateY(-14px); }
  }
  .hero-tanjiro-img {
    width: 100%; display: block;
    filter: drop-shadow(0 0 30px rgba(192,57,43,.5))
            drop-shadow(0 0 80px rgba(192,57,43,.2));
  }
  .hero-tanjiro-fallback {
    width: 100%; padding-bottom: 140%; position: relative;
    background: linear-gradient(160deg,#1a0505,#2a0808);
    border-radius: 8px;
  }
  .hero-content {
    position: relative; z-index: 5; text-align: center;
    max-width: 750px; display: flex; flex-direction: column;
    align-items: center; gap: 1.5rem;
    padding-right: clamp(0px,20vw,200px);
  }
  .hero-kanji {
    font-family:'Cinzel',serif; font-size:clamp(.9rem,2vw,1.1rem);
    letter-spacing:.6em; color:#C0392B; opacity:.7;
    text-shadow:0 0 20px rgba(192,57,43,.5);
    animation: hg-fadedown 1s ease both;
  }
  .hero-title {
    font-family:'Cinzel',serif; font-weight:900;
    font-size:clamp(3rem,9vw,7rem); line-height:.88;
    text-transform:uppercase; letter-spacing:.04em;
    animation: hg-fadedown 1s .1s ease both;
  }
  .hero-title .ht-line1 {
    display:block;
    background:linear-gradient(170deg,#F5E6C8 0%,#C9A84C 45%,#8B5E1A 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; filter:drop-shadow(0 2px 0 rgba(0,0,0,.5));
  }
  .hero-title .ht-line2 {
    display:block; font-size:.62em; letter-spacing:.22em;
    background:linear-gradient(170deg,#E74C3C 0%,#8B1010 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; filter:drop-shadow(0 0 15px rgba(192,57,43,.6));
  }
  .hero-divider {
    display:flex; align-items:center; gap:1rem;
    width:100%; max-width:400px;
    animation: hg-fadeup .8s .35s ease both;
  }
  .hero-divider::before,.hero-divider::after {
    content:''; flex:1; height:1px;
    background:linear-gradient(90deg,transparent,rgba(192,57,43,.5));
  }
  .hero-divider::after { background:linear-gradient(270deg,transparent,rgba(192,57,43,.5)); }
  .hero-diamond {
    width:8px; height:8px; background:#C0392B; transform:rotate(45deg);
    animation: hg-diamond 2s ease-in-out infinite;
  }
  @keyframes hg-diamond {
    0%,100% { box-shadow:0 0 8px rgba(192,57,43,.5); }
    50%      { box-shadow:0 0 20px rgba(192,57,43,.5),0 0 40px rgba(192,57,43,.3); }
  }
  .hero-slogan-wrap {
    position: relative; width: 100%; min-height: 3.5em;
    animation: hg-fadeup .8s .5s ease both; overflow: visible;
  }
  .hero-slogan {
    font-family:'Crimson Pro',serif;
    font-size: clamp(1rem, 2.5vw, 1.35rem);
    font-style: italic; color: #7A6A5A; letter-spacing: .05em;
    text-align: center; width: 100%; opacity: 0;
    transition: opacity 0.6s ease, transform 0.6s ease;
    position: static; display: none; margin: 0; padding: 0.3em 0;
  }
  .hero-slogan.active { display: block; opacity: 1; transform: translateY(0); }
  .hero-slogan .hs-name { color: #C9A84C; font-style: normal; font-weight: 600; }
  .hero-stats {
    display:flex; gap:1.5rem; flex-wrap:wrap; justify-content:center;
    animation: hg-fadeup .8s .7s ease both;
  }
  .hero-stat-item { display:flex; flex-direction:column; align-items:center; gap:.2rem; }
  .hero-stat-num {
    font-family:'Cinzel',serif; font-size:clamp(1.5rem,4vw,2.2rem);
    font-weight:900; color:#F0E6D3; line-height:1;
  }
  .hero-stat-num::after {
    content:attr(data-suffix); font-size:.5em;
    color:#C0392B; margin-left:2px; vertical-align:super;
  }
  .hero-stat-lbl {
    font-family:'Cinzel',serif; font-size:.65rem;
    letter-spacing:.2em; text-transform:uppercase; color:#7A6A5A;
  }
  .hero-stat-sep { width:1px; height:40px; background:rgba(255,255,255,.08); align-self:center; }
  .hero-cta {
    display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;
    animation: hg-fadeup .8s .9s ease both;
  }
  .btn-hero-p {
    font-family:'Cinzel',serif; font-size:.9rem; font-weight:700;
    letter-spacing:.15em; text-transform:uppercase; color:#F0E6D3;
    background:linear-gradient(135deg,#C0392B,#7A1515);
    border:none; padding:1rem 2.5rem; border-radius:4px; cursor:pointer;
    transition:transform .2s,box-shadow .2s;
    box-shadow:0 4px 30px rgba(192,57,43,.35);
    display:inline-flex; align-items:center; gap:.6rem;
  }
  .btn-hero-p:hover { transform:translateY(-3px); box-shadow:0 8px 40px rgba(192,57,43,.55); }
  .btn-hero-p:active { transform:translateY(-1px); }
  .btn-hero-s {
    font-family:'Cinzel',serif; font-size:.85rem; font-weight:700;
    letter-spacing:.1em; color:#7A6A5A;
    background:transparent; border:1px solid rgba(255,255,255,.1);
    padding:1rem 2rem; border-radius:4px; cursor:pointer;
    transition:all .2s; display:inline-flex; align-items:center;
  }
  .btn-hero-s:hover { border-color:rgba(255,255,255,.25); color:#F0E6D3; background:rgba(255,255,255,.04); }
  .hero-scroll-ind {
    position:absolute; bottom:1.5rem; left:50%; transform:translateX(-50%);
    z-index:5; display:flex; flex-direction:column; align-items:center; gap:.5rem;
    animation: hg-fadeup 1s 1.2s ease both; opacity:.5;
  }
  .hsi-text {
    font-family:'Cinzel',serif; font-size:.6rem;
    letter-spacing:.3em; text-transform:uppercase; color:#7A6A5A;
  }
  .hsi-line {
    width:1px; height:40px;
    background:linear-gradient(180deg,#C0392B,transparent);
    animation: hg-scroll 2s ease-in-out infinite;
  }
  @keyframes hg-scroll {
    0%   { transform:scaleY(0); transform-origin:top; opacity:1; }
    50%  { transform:scaleY(1); transform-origin:top; opacity:1; }
    51%  { transform:scaleY(1); transform-origin:bottom; opacity:1; }
    100% { transform:scaleY(0); transform-origin:bottom; opacity:0; }
  }
  @keyframes hg-fadedown {
    from { opacity:0; transform:translateY(-20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes hg-fadeup {
    from { opacity:0; transform:translateY(20px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @media (max-width:680px) {
    .hero-tanjiro-wrap { position:relative; right:auto; bottom:auto; width:clamp(140px,50vw,220px); margin-top:-1rem; order:-1; }
    .hero { flex-direction:column; justify-content:flex-start; padding-top:3rem; }
    .hero-content { padding-right:0; }
    .hero-stat-sep { display:none; }
  }
  @media (min-width:681px) { .hero-tanjiro-wrap { position:absolute; } }
  </style>
</head>
<body>

<!-- ========== HERO ========== -->
<section class="hero" id="hero">
  <div class="hero-pattern" aria-hidden="true"></div>
  <div class="hero-vignette" aria-hidden="true"></div>
  <div class="hero-glow" aria-hidden="true"></div>
  <div class="hero-breath-lines" id="hero-breath-lines" aria-hidden="true"></div>
  <canvas id="hero-canvas" aria-hidden="true"></canvas>

  <div class="hero-tanjiro-wrap" aria-hidden="true">
    <img class="hero-tanjiro-img" src="tanjiro.png" alt="Tanjiro Kamado" id="hero-tanjiro-img" />
  </div>

  <div class="hero-content">
    <p class="hero-kanji">鬼滅の刃</p>
    <h1 class="hero-title">
      <span class="ht-line1">Kimetsu</span>
      <span class="ht-line2">no Yaiba</span>
    </h1>
    <div class="hero-divider" aria-hidden="true"><div class="hero-diamond"></div></div>
    <div class="hero-slogan-wrap" aria-live="polite"></div>
    <div class="hero-stats">
      <div class="hero-stat-item"><span class="hero-stat-num" data-target="207" data-suffix="+">0</span><span class="hero-stat-lbl">Capítulos</span></div>
      <div class="hero-stat-sep" aria-hidden="true"></div>
      <div class="hero-stat-item"><span class="hero-stat-num" data-target="9" data-suffix="">0</span><span class="hero-stat-lbl">Pilares</span></div>
      <div class="hero-stat-sep" aria-hidden="true"></div>
      <div class="hero-stat-item"><span class="hero-stat-num" data-target="6" data-suffix="">0</span><span class="hero-stat-lbl">Lunas Sup.</span></div>
      <div class="hero-stat-sep" aria-hidden="true"></div>
      <div class="hero-stat-item"><span class="hero-stat-num" data-target="44" data-suffix="">0</span><span class="hero-stat-lbl">Técnicas</span></div>
    </div>
    <div class="hero-cta">
      <button class="btn-hero-p" onclick="heroGoToQuiz()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true"><path d="M8 2L14 8L8 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Comenzar Quiz
      </button>
      <button class="btn-hero-s" onclick="heroGoToQuiz()">Ver modos →</button>
    </div>
  </div>
  <div class="hero-scroll-ind" aria-hidden="true"><span class="hsi-text">Desplazar</span><div class="hsi-line"></div></div>
</section>

<!-- ========== APP PRINCIPAL ========== -->
<main id="app">

  <!-- MENÚ -->
  <section id="menu-screen" class="screen active">
    <header class="menu-header">
      <div class="japanese-title" aria-hidden="true">鬼滅の刃</div>
      <h1 class="main-title">QUIZ<br /><span>DEFINITIVO</span></h1>
      <p class="subtitle">Pon a prueba tu conocimiento del universo del Cazador de Demonios</p>
    </header>
    <div class="mode-grid">
      <button class="mode-card" data-mode="trivia">
        <div class="card-glow trivia-glow"></div><div class="card-icon">⚔️</div>
        <div class="card-body"><h2>Trivia General</h2><p>10 preguntas del anime.</p></div>
        <div class="card-badge">10 Preguntas</div>
      </button>
      <button class="mode-card" data-mode="respiracion">
        <div class="card-glow breath-glow"></div><div class="card-icon">💧</div>
        <div class="card-body"><h2>¿Qué Respiración Eres?</h2><p>Agua, Fuego, Trueno, Bestia o Insecto.</p></div>
        <div class="card-badge">Test Personalidad</div>
      </button>
      <button class="mode-card" data-mode="hashira">
        <div class="card-glow hashira-glow"></div><div class="card-icon">🏯</div>
        <div class="card-body"><h2>¿Qué Pilar Eres?</h2><p>Nueve pilares. Una sola alma.</p></div>
        <div class="card-badge">Test Personalidad</div>
      </button>
      <button class="mode-card" data-mode="luna">
        <div class="card-glow demon-glow"></div><div class="card-icon">🌙</div>
        <div class="card-body"><h2>¿Qué Luna Demoníaca Eres?</h2><p>Para los que admiran el poder desde las sombras.</p></div>
        <div class="card-badge">Lado Oscuro</div>
      </button>
      <button class="mode-card hangman-card" id="btn-hangman">
        <div class="card-glow hangman-card-glow"></div><div class="card-icon">🪢</div>
        <div class="card-body"><h2>Ahorcado del Cazador</h2><p>Adivina personajes, técnicas y lugares.</p></div>
        <div class="card-badge">Minijuego</div>
      </button>
      <button class="mode-card tateti-card" id="btn-tateti">
        <div class="card-glow tateti-card-glow"></div><div class="card-icon">♟️</div>
        <div class="card-body"><h2>Tateti: Demonios vs Cazadores</h2><p>Elige tu bando y enfrentate a la IA.</p></div>
        <div class="card-badge">Minijuego</div>
      </button>
      <button class="mode-card katana-card" id="btn-katana">
        <div class="card-glow katana-card-glow"></div><div class="card-icon">⚒️</div>
        <div class="card-body"><h2>Forja tu Katana</h2><p>Diseñá tu propia Nichirin.</p></div>
        <div class="card-badge">Creativo</div>
      </button>
      <!-- NUEVA TARJETA PARA ARCOS -->
      <button class="mode-card arcos-card" id="btn-arcos">
        <div class="card-glow arcos-glow"></div><div class="card-icon">🏯</div>
        <div class="card-body"><h2>Trivia por Arcos</h2><p>Desbloqueá los arcos del anime, con vidas y bonus.</p></div>
        <div class="card-badge">5 Arcos</div>
      </button>
    </div>
    <footer class="menu-footer"><p>「 無限の力を示せ — Demuestra un poder infinito 」</p></footer>
  </section>

  <!-- QUIZ (trivia/respiración/hashira/luna) -->
  <section id="quiz-screen" class="screen hidden">
    <!-- contenido generado por script.js -->
  </section>

  <!-- RESULTADO -->
  <section id="result-screen" class="screen hidden">
    <!-- contenido generado por script.js -->
  </section>

  <!-- MINIJUEGOS -->
  <section id="hangman-screen" class="screen hidden"></section>
  <section id="tateti-screen" class="screen hidden"></section>
  <section id="katana-screen" class="screen hidden"></section>

  <!-- NUEVA PANTALLA DE ARCOS -->
  <section id="trivia-arcos-screen" class="screen hidden"></section>

</main>

<!-- Overlay de Tanjiro sorprendido (usado en todos los modos) -->
<div id="tanjiro-surprised-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center;">
  <img src="tanjirosorprendido.png" alt="Tanjiro sorprendido" style="max-width:70vw; max-height:70vh; pointer-events:none;">
</div>

<!-- SCRIPTS: orden correcto -->
<script src="router.js" defer></script>
<script src="utils.js" defer></script>
<script src="script.js" defer></script>
<script src="minijuegos.js" defer></script>
<script src="trivia-arcos.js" defer></script>

<!-- Hero script (sin cambios) -->
<script>
(function() {
  var SLOGANS = [
    { char:'Tanjiro', text:'"Sin importar cuántas veces me rompa, me volveré a levantar."' },
    { char:'Rengoku', text:'"¡Pon todo tu corazón en llamas y avanza!"' },
    { char:'Zenitsu', text:'"Aunque me muera del miedo, haré lo que deba hacer."' },
    { char:'Inosuke', text:'"¡Nadie sabe el techo de mis capacidades más que yo!"' },
    { char:'Shinobu', text:'"Sigo sonriendo porque hace mucho que aprendí a hacerlo."' },
    { char:'Nezuko',  text:'"Protege a los humanos. Sé fuerte. Sé gentil."' },
    { char:'Gyomei',  text:'"La fe y la voluntad mueven montañas que el acero no puede cortar."' },
    { char:'Muzan',   text:'"La eternidad no se concede. Se arrebata."' },
  ];
  var wrap = document.querySelector('.hero-slogan-wrap');
  var idx = 0;
  SLOGANS.forEach(function(s, i) {
    var el = document.createElement('p');
    el.className = 'hero-slogan';
    el.innerHTML = '<span class="hs-name">' + s.char + '</span> — ' + s.text;
    wrap.appendChild(el);
  });
  var items = wrap.querySelectorAll('.hero-slogan');
  if (items.length > 0) items[0].classList.add('active');
  setInterval(function() {
    items[idx].classList.remove('active');
    idx = (idx + 1) % items.length;
    items[idx].classList.add('active');
  }, 3800);

  // Contadores
  function animateCounters() {
    document.querySelectorAll('.hero-stat-num[data-target]').forEach(function(el) {
      var target = parseInt(el.dataset.target);
      var t0 = performance.now();
      (function tick(now) {
        var p = Math.min((now - t0) / 1800, 1);
        var e = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(e * target);
        if (p < 1) requestAnimationFrame(tick);
        else el.textContent = target;
      })(t0);
    });
  }
  var obs = new IntersectionObserver(function(entries, o) {
    if (entries[0].isIntersecting) { setTimeout(animateCounters, 600); o.disconnect(); }
  }, { threshold: 0.4 });
  obs.observe(document.getElementById('hero'));

  // Líneas de respiración y canvas (…mantén el resto del código del hero tal cual)
  // ...
  window.heroGoToQuiz = function() { document.getElementById('app').scrollIntoView({ behavior:'smooth' }); };
})();
</script>
</body>
</html>
