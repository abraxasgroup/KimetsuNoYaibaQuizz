<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>鬼滅の刃 — Quiz Definitivo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="minijuegos.css" />
  <style>
    /* Estilos del hero (idénticos a los anteriores) */
    /* ... (copia todo el bloque <style> que tenías antes, incluyendo .hero, etc.) ... */
  </style>
</head>
<body>

<!-- HERO (sin cambios) -->
<section class="hero" id="hero">
  <!-- todo el contenido del hero igual -->
</section>

<main id="app">

  <!-- MENÚ -->
  <section id="menu-screen" class="screen active">
    <header class="menu-header">
      <div class="japanese-title" aria-hidden="true">鬼滅の刃</div>
      <h1 class="main-title">QUIZ<br /><span>DEFINITIVO</span></h1>
      <p class="subtitle">Pon a prueba tu conocimiento del universo del Cazador de Demonios</p>
    </header>
    <div class="mode-grid">
      <!-- Tests de personalidad -->
      <button class="mode-card" data-mode="respiracion">
        <div class="card-glow breath-glow"></div><div class="card-icon">💧</div>
        <div class="card-body"><h2>¿Qué Respiración Eres?</h2><p>Agua, Fuego, Trueno, Bestia o Insecto.</p></div>
        <div class="card-badge">Test Personalidad</div>
      </button>
      <button class="mode-card" data-mode="hashira">
        <div class="card-glow hashira-glow"></div><div class="card-icon">🏯</div>
        <div class="card-body"><h2>¿Qué Pilar Eres?</h2><p>Nueve pilares. Una sola alma.</p></div>
        <div class="card-badge">Test Personalidad</div>
      </button>
      <button class="mode-card" data-mode="luna">
        <div class="card-glow demon-glow"></div><div class="card-icon">🌙</div>
        <div class="card-body"><h2>¿Qué Luna Demoníaca Eres?</h2><p>Para los que admiran el poder desde las sombras.</p></div>
        <div class="card-badge">Lado Oscuro</div>
      </button>

      <!-- Minijuegos -->
      <button class="mode-card hangman-card" id="btn-hangman">
        <div class="card-glow hangman-card-glow"></div><div class="card-icon">🪢</div>
        <div class="card-body"><h2>Ahorcado del Cazador</h2><p>Adivina personajes, técnicas y lugares.</p></div>
        <div class="card-badge">Minijuego</div>
      </button>
      <button class="mode-card tateti-card" id="btn-tateti">
        <div class="card-glow tateti-card-glow"></div><div class="card-icon">♟️</div>
        <div class="card-body"><h2>Tateti: Demonios vs Cazadores</h2><p>Elige tu bando y enfrentate a la IA.</p></div>
        <div class="card-badge">Minijuego</div>
      </button>
      <button class="mode-card katana-card" id="btn-katana">
        <div class="card-glow katana-card-glow"></div><div class="card-icon">⚒️</div>
        <div class="card-body"><h2>Forja tu Katana</h2><p>Diseñá tu propia Nichirin.</p></div>
        <div class="card-badge">Creativo</div>
      </button>

      <!-- Trivia por Arcos (único quiz) -->
      <button class="mode-card arcos-card" id="btn-arcos">
        <div class="card-glow arcos-glow"></div><div class="card-icon">🏯</div>
        <div class="card-body"><h2>Trivia por Arcos</h2><p>Desbloqueá los arcos del anime, con vidas y bonus.</p></div>
        <div class="card-badge">5 Arcos</div>
      </button>
    </div>
    <footer class="menu-footer"><p>「 無限の力を示せ — Demuestra un poder infinito 」</p></footer>
  </section>

  <!-- Pantallas dinámicas (contenido generado por los módulos) -->
  <section id="quiz-screen" class="screen hidden"></section>
  <section id="result-screen" class="screen hidden"></section>
  <section id="hangman-screen" class="screen hidden"></section>
  <section id="tateti-screen" class="screen hidden"></section>
  <section id="katana-screen" class="screen hidden"></section>
  <section id="trivia-arcos-screen" class="screen hidden"></section>
</main>

<!-- Overlay Tanjiro sorprendido -->
<div id="tanjiro-surprised-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:999; justify-content:center; align-items:center;">
  <img src="tanjirosorprendido.png" alt="Tanjiro sorprendido" style="max-width:70vw; max-height:70vh; pointer-events:none;">
</div>

<!-- Scripts en orden -->
<script src="router.js"></script>
<script src="utils.js"></script>
<script src="script.js"></script>
<script src="minijuegos.js"></script>
<script src="trivia-arcos.js"></script>

<!-- Hero script (tu código original) -->
<script>
  (function() { /* ... todo el código del hero ... */ })();
</script>
</body>
</html>
